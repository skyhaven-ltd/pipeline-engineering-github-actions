name: "Infracost PR Comment"
description: "Generates an Infracost diff from a Terraform plan JSON and posts a sticky pull request comment."

inputs:
  plan_json_path:
    description: "Path to the Terraform plan JSON file."
    required: true
  api_key:
    description: "Infracost API key (hosted Cloud Pricing API)."
    required: true
  github_token:
    description: "Token used to post the PR comment (needs pull-requests: write)."
    required: true
  pull_request_number:
    description: "The pull request number to comment on."
    required: true
  behavior:
    description: "Infracost comment behavior: update, new, delete-and-new, or hide-and-new."
    required: false
    default: update
  comment_tag:
    description: "Sticky comment tag. Use a per-environment value (e.g. infracost-dev) to keep one comment per environment."
    required: false
    default: infracost
  usage_file:
    description: "Optional path to an Infracost usage file."
    required: false
    default: ""
  infracost_version:
    description: "Infracost CLI version to install."
    required: false
    default: "0.10.44"

runs:
  using: composite
  steps:
    - name: "Require Infracost API Key"
      shell: bash
      env:
        INFRACOST_API_KEY: ${{ inputs.api_key }}
      run: |
        set -euo pipefail
        if [[ -z "${INFRACOST_API_KEY:-}" ]]; then
          echo "::error::Infracost API key is required when Infracost is enabled." >&2
          exit 1
        fi

    - name: "Install Infracost"
      shell: bash
      env:
        INFRACOST_VERSION: ${{ inputs.infracost_version }}
      run: |
        set -euo pipefail
        curl -fsSL \
          --output /tmp/infracost.tar.gz \
          "https://github.com/infracost/infracost/releases/download/v${INFRACOST_VERSION}/infracost-linux-amd64.tar.gz"
        tar -xzf /tmp/infracost.tar.gz -C /tmp
        sudo install -m 0755 /tmp/infracost-linux-amd64 /usr/local/bin/infracost
        infracost --version

    - name: "Generate Infracost Diff"
      shell: bash
      env:
        INFRACOST_API_KEY: ${{ inputs.api_key }}
        PLAN_JSON_PATH: ${{ inputs.plan_json_path }}
        USAGE_FILE: ${{ inputs.usage_file }}
        COMMENT_TAG: ${{ inputs.comment_tag }}
      run: |
        set -euo pipefail
        ARGS=(diff --path "${PLAN_JSON_PATH}" --format json --out-file "/tmp/infracost-${COMMENT_TAG}.json")
        if [[ -n "${USAGE_FILE}" ]]; then
          ARGS+=(--usage-file "${USAGE_FILE}")
        fi
        infracost "${ARGS[@]}"

    - name: "Post Infracost Comment"
      shell: bash
      env:
        INFRACOST_API_KEY: ${{ inputs.api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        PR_NUMBER: ${{ inputs.pull_request_number }}
        BEHAVIOR: ${{ inputs.behavior }}
        COMMENT_TAG: ${{ inputs.comment_tag }}
      run: |
        set -euo pipefail

        # Use `infracost output` and GitHub's API directly instead of
        # `infracost comment github`. The latter enforces Infracost Cloud
        # governance policies (for example tag policies) as a side effect of
        # posting the comment; this workflow is intentionally cost visibility
        # only and must not fail a PR for governance policy findings.
        raw_comment_path="/tmp/infracost-${COMMENT_TAG}.md"
        tagged_comment_path="/tmp/infracost-${COMMENT_TAG}-tagged.md"
        marker="[//]: <> (${COMMENT_TAG})"

        infracost output \
          --path "/tmp/infracost-${COMMENT_TAG}.json" \
          --format github-comment \
          --show-skipped \
          --out-file "${raw_comment_path}"

        {
          echo "${marker}"
          echo
          cat "${raw_comment_path}"
        } > "${tagged_comment_path}"

        api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments"
        comments_json="$(mktemp)"
        body_json="$(mktemp)"

        jq -n --rawfile body "${tagged_comment_path}" '{body: $body}' > "${body_json}"

        curl -fsSL \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "${api_url}?per_page=100" > "${comments_json}"

        matching_ids="$(
          jq -r --arg marker "${marker}" '.[] | select(.body | contains($marker)) | .id' "${comments_json}"
        )"
        latest_id="$(printf '%s\n' "${matching_ids}" | sed '/^$/d' | tail -n 1)"

        post_comment() {
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}" \
            --data @"${body_json}" >/dev/null
        }

        patch_comment() {
          local comment_id="$1"
          curl -fsSL \
            -X PATCH \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
            --data @"${body_json}" >/dev/null
        }

        delete_comment() {
          local comment_id="$1"
          curl -fsSL \
            -X DELETE \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" >/dev/null
        }

        case "${BEHAVIOR}" in
          update)
            if [[ -n "${latest_id}" ]]; then
              patch_comment "${latest_id}"
            else
              post_comment
            fi
            ;;
          new)
            post_comment
            ;;
          delete-and-new)
            while IFS= read -r comment_id; do
              [[ -z "${comment_id}" ]] && continue
              delete_comment "${comment_id}"
            done <<< "${matching_ids}"
            post_comment
            ;;
          hide-and-new)
            echo "::warning::hide-and-new is not supported by the cost-only GitHub REST poster; using delete-and-new."
            while IFS= read -r comment_id; do
              [[ -z "${comment_id}" ]] && continue
              delete_comment "${comment_id}"
            done <<< "${matching_ids}"
            post_comment
            ;;
          *)
            echo "::error::Unsupported Infracost comment behavior: ${BEHAVIOR}" >&2
            exit 1
            ;;
        esac
