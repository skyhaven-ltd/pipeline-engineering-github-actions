name: Workflow Lint

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read

env:
  ZIZMOR_VERSION: "1.26.1"

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run actionlint
        # github.job_workflow_sha is a documented context property (the SHA of
        # the called reusable workflow file) that actionlint's github context
        # type model does not know about yet — suppress that false positive.
        run: actionlint -color -ignore 'property "job_workflow_sha" is not defined'

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install zizmor
        run: |
          set -euo pipefail
          python -m pip install --user "zizmor==${ZIZMOR_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run zizmor
        run: zizmor .github/workflows actions
